<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBOM Loan Comparison</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--brand:#007A3E;--brand-mid:#005C2E;--brand-light:#e6f4ed;--accent:#FFC000;--danger:#c0392b;--bg:#f0f4f2;--bg-card:#ffffff;--bg-subtle:#f7faf8;--text-primary:#1a2820;--text-secondary:#44546A;--text-muted:#7a8e85;--border:#dde8e2;--border-strong:#b8cec4;--radius:12px;--shadow-md:0 2px 12px rgba(0,122,62,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
header{background:var(--brand-mid);color:#fff;padding:0 2rem;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:.65rem;font-weight:700;font-size:1.1rem;letter-spacing:-.01em}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon i{color:#1a1a1a;width:20px;height:20px}
.header-badge{font-size:.75rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:.25rem .75rem}
.btn-back{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .9rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:7px;font-size:.82rem;font-weight:700;text-decoration:none;transition:all .2s}
.btn-back:hover{background:rgba(255,255,255,.25)}
.main{max-width:1400px;margin:2rem auto;padding:0 1.5rem}
h1{font-size:1.4rem;font-weight:800;color:var(--brand-mid);margin-bottom:.25rem}
.page-sub{font-size:.85rem;color:var(--text-muted);margin-bottom:1.5rem}
/* GRID */
.cmp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:2rem}
@media(max-width:900px){.cmp-grid{grid-template-columns:1fr}}
.cmp-col{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden}
.cmp-col-header{background:var(--brand);color:#fff;padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.cmp-col-header h2{font-size:.95rem;font-weight:700}
.cmp-col-body{padding:1rem 1.1rem}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:.32rem}
.input-wrap{display:flex;align-items:center;border:1.5px solid var(--border-strong);border-radius:8px;overflow:hidden;background:var(--bg-subtle)}
.input-wrap:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,122,62,.12)}
.ip{padding:.3rem .5rem;font-size:.8rem;font-weight:700;color:var(--text-muted);background:var(--bg-subtle);border:none;flex-shrink:0}
.input-wrap input,.input-wrap select{flex:1;padding:.55rem .7rem;border:none;font-size:.9rem;color:var(--text-primary);background:transparent;outline:none}
input[type=range]{width:100%;height:5px;border-radius:3px;background:var(--border-strong);outline:none;margin-top:.5rem;cursor:pointer;accent-color:var(--brand)}
.range-labels{display:flex;justify-content:space-between;font-size:.67rem;color:var(--text-muted);margin-top:.25rem}
.basis-btns{display:flex;gap:.4rem}
.basis-btn{flex:1;padding:.38rem .4rem;border:1.5px solid var(--border-strong);border-radius:6px;background:var(--bg-subtle);color:var(--text-secondary);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
.basis-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.ppy-btns{display:flex;gap:.35rem}
.ppy-btn{flex:1;padding:.35rem .25rem;border:1.5px solid var(--border-strong);border-radius:6px;background:var(--bg-subtle);color:var(--text-secondary);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;line-height:1.2}
.ppy-btn span{font-size:.6rem;font-weight:500}
.ppy-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.results-panel{background:var(--brand-light);border-top:2px solid var(--brand);padding:.85rem 1.1rem}
.result-hero{text-align:center;margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.result-hero .label{font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.result-hero .amount{font-size:1.9rem;font-weight:800;color:var(--brand);letter-spacing:-.02em}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:7px;padding:.5rem .65rem}
.stat-label{font-size:.65rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:.95rem;font-weight:700;color:var(--text-primary);margin-top:.15rem}
.stat.highlight{border-color:var(--brand);background:var(--brand-light)}
.stat.highlight .stat-value{color:var(--brand)}
.stat.danger{border-color:#fcc;background:#fff5f5}
.stat.danger .stat-value{color:var(--danger)}
/* COMPARISON TABLE */
.cmp-table-wrap{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;margin-bottom:2rem}
.cmp-table-header{background:var(--brand-mid);color:#fff;padding:.85rem 1.25rem;font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.cmp-table{width:100%;border-collapse:collapse;font-size:.85rem}
.cmp-table th{background:var(--brand-light);color:var(--brand-mid);font-weight:700;padding:.6rem 1rem;text-align:left;border-bottom:2px solid var(--border)}
.cmp-table th:not(:first-child){text-align:right}
.cmp-table td{padding:.55rem 1rem;border-bottom:1px solid var(--border);color:var(--text-secondary)}
.cmp-table td:not(:first-child){text-align:right;font-weight:600;color:var(--text-primary)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table .best{color:var(--brand);font-weight:800}
.cmp-table .worst{color:var(--danger)}
.winner-badge{display:inline-block;font-size:.6rem;font-weight:700;background:var(--accent);color:#1a1a1a;padding:.1rem .4rem;border-radius:4px;margin-left:.4rem;vertical-align:middle}
footer{text-align:center;padding:1.75rem 1.5rem;font-size:.72rem;color:var(--text-muted);border-top:1px solid var(--border);background:var(--bg-card);margin-top:1rem}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-icon"><i data-lucide="landmark"></i></div>TBOM</div>
    <span class="header-badge">Loan Comparison</span>
    <a href="index.html" class="btn-back"><i data-lucide="arrow-left" style="width:14px;height:14px"></i> Back to Calculator</a>
      <a href="breakeven.html" style="display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .9rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:7px;font-size:.82rem;font-weight:700;text-decoration:none">
        <i data-lucide="calculator" style="width:14px;height:14px"></i> Break-Even
      </a>
      <a href="customer.html" style="display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .9rem;background:var(--accent);color:#1a1a1a;border:none;border-radius:7px;font-size:.82rem;font-weight:700;text-decoration:none">
        <i data-lucide="user" style="width:14px;height:14px"></i> Customer Report
      </a>
  </div>
</header>

<main class="main">
  <h1>Side-by-Side Loan Comparison</h1>
  <p class="page-sub">Configure up to 3 loan scenarios and compare them instantly.</p>

  <div class="cmp-grid" id="cmpGrid">
    <!-- Scenario columns injected by JS -->
  </div>

  <div class="cmp-table-wrap">
    <div class="cmp-table-header"><i data-lucide="table" style="width:16px;height:16px"></i> Comparison Summary</div>
    <table class="cmp-table">
      <thead>
        <tr><th>Metric</th><th id="th0">Scenario A</th><th id="th1">Scenario B</th><th id="th2">Scenario C</th></tr>
      </thead>
      <tbody id="cmpTbody"></tbody>
    </table>
  </div>
</main>
<footer>&copy; 2026 <strong>The Bank of Missouri</strong> &mdash; Loan Comparison Tool</footer>

<script>
const SCENARIOS=[
  {label:'Scenario A',loan:1240000,rate:6.99,term:240,ppy:12,basis:'commercial'},
  {label:'Scenario B',loan:1240000,rate:7.50,term:180,ppy:12,basis:'commercial'},
  {label:'Scenario C',loan:1240000,rate:6.50,term:300,ppy:12,basis:'commercial'},
];

function periodicRate(r,ppy,basis){
  if(basis==='consumer') return r/100/ppy;
  return (r/100/360)*(365/ppy);
}
function buildAmort(loan,rate,termMonths,ppy,basis){
  const n=Math.round(termMonths*(ppy/12));
  const r=periodicRate(rate,ppy,basis);
  const pmt=r===0?loan/n:loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  let bal=loan,totInt=0,totPaid=0;
  for(let i=0;i<n;i++){
    const intPmt=bal*r;
    const prinPmt=Math.min(pmt-intPmt,bal);
    bal=Math.max(0,bal-prinPmt);
    totInt+=intPmt;
    totPaid+=(intPmt+prinPmt);
    if(bal<0.01){break;}
  }
  return{payment:pmt,totalInterest:totInt,totalPaid:totPaid,periods:n};
}
function fmtC(n){return '$'+Math.round(n).toLocaleString();}
function fmtR(n){return n.toFixed(2)+'%';}

function renderCol(idx){
  const s=SCENARIOS[idx];
  const res=buildAmort(s.loan,s.rate,s.term,s.ppy,s.basis);
  const colors=['#007A3E','#005C2E','#FFC000'];
  return `
  <div class="cmp-col">
    <div class="cmp-col-header" style="background:${colors[idx]}">
      <h2>${s.label}</h2>
    </div>
    <div class="cmp-col-body">
      <div class="field">
        <label>Loan Amount</label>
        <div class="input-wrap"><span class="ip">$</span><input type="text" value="${s.loan.toLocaleString()}" oninput="updateScenario(${idx},'loan',this.value)"></div>
      </div>
      <div class="field">
        <label>Interest Rate</label>
        <div class="input-wrap"><input type="number" value="${s.rate}" step="0.01" min="0.01" max="30" oninput="updateScenario(${idx},'rate',this.value)"><span class="ip">%</span></div>
        <input type="range" min="1" max="20" step="0.01" value="${s.rate}" oninput="updateScenario(${idx},'rate',this.value);this.previousElementSibling.previousElementSibling.querySelector('input').value=this.value">
        <div class="range-labels"><span>1%</span><span>20%</span></div>
      </div>
      <div class="field">
        <label>Amortization (months)</label>
        <div class="input-wrap"><input type="number" value="${s.term}" min="12" max="480" oninput="updateScenario(${idx},'term',this.value)"><span class="ip">mo</span></div>
        <input type="range" min="12" max="480" step="1" value="${s.term}" oninput="updateScenario(${idx},'term',this.value);this.previousElementSibling.previousElementSibling.querySelector('input').value=this.value">
        <div class="range-labels"><span>12 mo</span><span>480 mo</span></div>
      </div>
      <div class="field">
        <label>Payments/Year</label>
        <div class="ppy-btns">
          <button class="ppy-btn ${s.ppy===12?'active':''}" onclick="updateScenario(${idx},'ppy',12);refreshBtns(${idx})">12<span>Monthly</span></button>
          <button class="ppy-btn ${s.ppy===4?'active':''}" onclick="updateScenario(${idx},'ppy',4);refreshBtns(${idx})">4<span>Quarterly</span></button>
          <button class="ppy-btn ${s.ppy===2?'active':''}" onclick="updateScenario(${idx},'ppy',2);refreshBtns(${idx})">2<span>Semi-Ann</span></button>
          <button class="ppy-btn ${s.ppy===1?'active':''}" onclick="updateScenario(${idx},'ppy',1);refreshBtns(${idx})">1<span>Annual</span></button>
        </div>
      </div>
      <div class="field">
        <label>Loan Type</label>
        <div class="basis-btns">
          <button class="basis-btn ${s.basis==='commercial'?'active':''}" onclick="updateScenario(${idx},'basis','commercial');refreshBtns(${idx})">Commercial</button>
          <button class="basis-btn ${s.basis==='consumer'?'active':''}" onclick="updateScenario(${idx},'basis','consumer');refreshBtns(${idx})">Consumer</button>
        </div>
      </div>
    </div>
    <div class="results-panel" id="res${idx}">
      <div class="result-hero">
        <div class="label">${{12:'Monthly',4:'Quarterly',2:'Semi-Annual',1:'Annual'}[s.ppy]||'Periodic'} Payment</div>
        <div class="amount">${fmtC(res.payment)}</div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Loan Amount</div><div class="stat-value">${fmtC(s.loan)}</div></div>
        <div class="stat"><div class="stat-label">Payments</div><div class="stat-value">${res.periods}</div></div>
        <div class="stat danger"><div class="stat-label">Total Interest</div><div class="stat-value">${fmtC(res.totalInterest)}</div></div>
        <div class="stat"><div class="stat-label">Total Paid</div><div class="stat-value">${fmtC(res.totalPaid)}</div></div>
      </div>
    </div>
  </div>`;
}

function updateScenario(idx,key,val){
  if(key==='loan') SCENARIOS[idx].loan=parseFloat(String(val).replace(/[^0-9.]/g,''))||0;
  else if(key==='rate') SCENARIOS[idx].rate=parseFloat(val)||0;
  else if(key==='term') SCENARIOS[idx].term=parseInt(val)||12;
  else if(key==='ppy') SCENARIOS[idx].ppy=parseInt(val)||12;
  else if(key==='basis') SCENARIOS[idx].basis=val;
  refreshResults();
  updateTable();
}

function refreshBtns(idx){
  const s=SCENARIOS[idx];
  const col=document.querySelectorAll('.cmp-col')[idx];
  if(!col) return;
  col.querySelectorAll('.ppy-btn').forEach((b,i)=>{
    const vals=[12,4,2,1];
    b.classList.toggle('active',vals[i]===s.ppy);
  });
  col.querySelectorAll('.basis-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&s.basis==='commercial')||(i===1&&s.basis==='consumer'));
  });
}

function refreshResults(){
  SCENARIOS.forEach((s,idx)=>{
    const res=buildAmort(s.loan,s.rate,s.term,s.ppy,s.basis);
    const panel=document.getElementById('res'+idx);
    if(!panel) return;
    const ppyLbl={12:'Monthly',4:'Quarterly',2:'Semi-Annual',1:'Annual'};
    panel.innerHTML=`
      <div class="result-hero">
        <div class="label">${ppyLbl[s.ppy]||'Periodic'} Payment</div>
        <div class="amount">${fmtC(res.payment)}</div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Loan Amount</div><div class="stat-value">${fmtC(s.loan)}</div></div>
        <div class="stat"><div class="stat-label">Payments</div><div class="stat-value">${res.periods}</div></div>
        <div class="stat danger"><div class="stat-label">Total Interest</div><div class="stat-value">${fmtC(res.totalInterest)}</div></div>
        <div class="stat"><div class="stat-label">Total Paid</div><div class="stat-value">${fmtC(res.totalPaid)}</div></div>
      </div>`;
  });
  updateTable();
}

function updateTable(){
  const results=SCENARIOS.map(s=>({s,r:buildAmort(s.loan,s.rate,s.term,s.ppy,s.basis)}));
  const minPmt=Math.min(...results.map(x=>x.r.payment));
  const minInt=Math.min(...results.map(x=>x.r.totalInterest));
  const minTot=Math.min(...results.map(x=>x.r.totalPaid));
  const minPer=Math.min(...results.map(x=>x.r.periods));
  const rows=[
    {label:'Periodic Payment',vals:results.map(x=>fmtC(x.r.payment)),mins:results.map(x=>x.r.payment),minVal:minPmt},
    {label:'Total Interest',vals:results.map(x=>fmtC(x.r.totalInterest)),mins:results.map(x=>x.r.totalInterest),minVal:minInt,danger:true},
    {label:'Total Paid',vals:results.map(x=>fmtC(x.r.totalPaid)),mins:results.map(x=>x.r.totalPaid),minVal:minTot},
    {label:'Number of Payments',vals:results.map(x=>x.r.periods),mins:results.map(x=>x.r.periods),minVal:minPer},
    {label:'Amortization',vals:results.map(x=>`${x.s.term} mo`),mins:null},
    {label:'Rate',vals:results.map(x=>fmtR(x.s.rate)),mins:null},
    {label:'Loan Type',vals:results.map(x=>x.s.basis==='consumer'?'Consumer':'Commercial'),mins:null},
  ];
  const tbody=document.getElementById('cmpTbody');
  tbody.innerHTML=rows.map(row=>`<tr><td>${row.label}</td>${results.map((x,i)=>{
    const v=row.vals[i];
    const isMin=row.mins&&row.mins[i]===row.minVal;
    const cls=isMin?(row.danger?'best':'best'):'';
    return `<td class="${cls}">${v}${isMin?'<span class="winner-badge">BEST</span>':''}</td>`;
  }).join('')}</tr>`).join('');
  ['th0','th1','th2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.textContent=SCENARIOS[i].label;
  });
}

// Pre-fill from URL if coming from index.html share link
const urlP=new URLSearchParams(window.location.search);
if(urlP.get('loan')){
  SCENARIOS[0].loan=parseFloat(urlP.get('loan'))||1240000;
  SCENARIOS[0].rate=parseFloat(urlP.get('rate'))||6.99;
  SCENARIOS[0].term=parseInt(urlP.get('term'))||240;
  SCENARIOS[0].ppy=parseInt(urlP.get('ppy'))||12;
  SCENARIOS[0].basis=urlP.get('basis')||'commercial';
}

document.addEventListener('DOMContentLoaded',()=>{
  lucide.createIcons();
  const grid=document.getElementById('cmpGrid');
  grid.innerHTML=SCENARIOS.map((s,i)=>renderCol(i)).join('');
  updateTable();
  lucide.createIcons();
});
</script>
</body>
</html>
